name: chipyard-chisel7

on:
  pull_request:
    branches:
      - main
      - '1.[0-9]*.x'
  workflow_dispatch:

defaults:
  run:
    shell: bash -leo pipefail {0}

jobs:
  chisel7-firrtl:
    name: chisel7-firrtl
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Init submodules (saturn only)
        run: |
          nix develop --no-write-lock-file --command bash -lc \
            'dep/scripts/init-submodules-no-riscv-tools-nolog.sh --saturn'

      - name: Run firrtl target with Chisel 7
        env:
          USE_CHISEL7: "1"
        run: |
          nix develop --no-write-lock-file --command bash -lc \
            'cd soc-gen/sims/verilator && make firrtl'
