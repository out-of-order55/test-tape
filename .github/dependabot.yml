version: 2

# update weekly (to avoid spam)
updates:
  # bump submodules.
  # updates a submodule to the latest commit on the branch given in .gitmodules.
  # if branch not given, then it defaults to the main/master branch.
  - package-ecosystem: gitsubmodule
    schedule:
      interval: "weekly"
    directory: /
    labels:
      - "dependencies"
      - "changelog:omit"
    # allow certain submodules
    allow:
      - dependency-name: "soc-generator/sims/firesim"
      - dependency-name: "applications/baremetal-ide"
      - dependency-name: "applications/firemarshal"
      - dependency-name: "dependencies/toolchains/riscv-tools/riscv-isa-sim"
      - dependency-name: "dependencies/toolchains/riscv-tools/riscv-openocd"
      - dependency-name: "dependencies/toolchains/riscv-tools/riscv-pk"
      - dependency-name: "dependencies/toolchains/riscv-tools/riscv-spike-devices"
      - dependency-name: "dependencies/toolchains/riscv-tools/riscv-tests"
  # submit a PR for bumping GH-A dependencies
  - package-ecosystem: github-actions
    schedule:
      interval: "weekly"
    directory: /
    labels:
      - "dependencies"
      - "changelog:omit"
